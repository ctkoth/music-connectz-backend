<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music ConnectZ - 用户数据删除说明</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1e2430;
      --muted: #4f5d75;
      --accent: #0f62fe;
      --border: #dde3ee;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 6px 20px rgba(20, 32, 60, 0.06);
    }

    h1 {
      margin-top: 0;
      font-size: 1.9rem;
    }

    h2 {
      font-size: 1.2rem;
      margin-top: 1.6rem;
    }

    ul {
      padding-left: 20px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 22px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Music ConnectZ - 用户数据删除说明</h1>

      <p>
        如果您想删除您的 Music ConnectZ 账户数据，请向
        <a href="mailto:ctkoth@gmail.com">ctkoth@gmail.com</a> 发送一条请求，主题行为
        <strong>Data Deletion Request</strong>。
      </p>

      <h2>请包括</h2>
      <ul>
        <li>您的全名</li>
        <li>用于登录的电子邮件地址</li>
        <li>使用的登录提供商（例如：Facebook、Google、GitHub）</li>
      </ul>

      <h2>我们删除什么</h2>
      <ul>
        <li>Music ConnectZ 存储的配置文件和账户数据</li>
        <li>链接到您账户的连接登录记录</li>
      </ul>

      <h2>处理时间</h2>
      <p>删除请求将在 30 天内处理。</p>

      <p class="meta">最后更新：2026 年 3 月 26 日</p>
    </section>
  </main>
</body>
</html>
