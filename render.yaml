services:
  - type: web
    name: music-connectz-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    preDeployCommand: "python manage.py migrate && python manage.py seed_skillz && python manage.py seed_dawz"
    startCommand: "gunicorn music_connectz.wsgi:application"
    healthCheckPath: /healthz/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "admin.musicconnectz.net,.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://musicconnectz.net,https://www.musicconnectz.net"
      - key: FRONTEND_URL
        value: "https://musicconnectz.net"
      - key: BACKEND_URL
        value: "https://admin.musicconnectz.net"
      - key: DATABASE_URL
        sync: false
      # Optional — set to enable social login:
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
