services:
  - type: web
    name: music-connectz-backend
    runtime: python
    branch: main
    autoDeploy: true
    rootDir: .
    buildCommand: "./build.sh"
    startCommand: "gunicorn music_connectz.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: APPLE_OAUTH_CLIENT_ID
        sync: false
      # Object storage for user uploads (S3 / Cloudflare R2). Set these to
      # persist FileZ uploads across deploys; leave unset to use the local
      # (ephemeral) filesystem. For R2 also set S3_ENDPOINT_URL.
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_CUSTOM_DOMAIN
        sync: false
