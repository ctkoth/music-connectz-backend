name: CI/CD — Test, Lint, Deploy (Render)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: music_connectz.settings

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff (preferred), with flake8 fallback if ruff is not available.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          # Prefer ruff. If a project already pins ruff in requirements.txt /
          # pyproject.toml, that pin wins; otherwise install latest.
          if ! pip install "ruff>=0.4"; then
            echo "::warning::Could not install ruff — falling back to flake8."
            pip install "flake8>=6"
          fi

      - name: Run ruff (with flake8 fallback)
        run: |
          if command -v ruff >/dev/null 2>&1; then
            echo "Running ruff check..."
            ruff check . --output-format=github
          else
            echo "::warning::ruff not available — running flake8 fallback."
            # Stop the build on Python syntax errors / undefined names
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
            # Soft warnings (treated as warnings, do not fail)
            flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          fi

  # ---------------------------------------------------------------------------
  # Django tests — runs against a Postgres service container so psycopg2 +
  # DATABASE_URL parsing behave the same as on Render.
  # ---------------------------------------------------------------------------
  test:
    name: Django tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: musicconnectz
          POSTGRES_PASSWORD: musicconnectz
          POSTGRES_DB: musicconnectz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U musicconnectz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://musicconnectz:musicconnectz@localhost:5432/musicconnectz_test
      DJANGO_SECRET_KEY: ci-insecure-test-key-do-not-use-in-prod
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      FRONTEND_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check --deploy --fail-level WARNING || python manage.py check

      - name: Run migrations (test DB)
        run: python manage.py migrate --no-input

      - name: Run Django tests
        run: python manage.py test --verbosity=2 --noinput

  # ---------------------------------------------------------------------------
  # Deploy — triggers Render deploy hook. Render itself runs the build command
  # (pip install, collectstatic, makemigrations, migrate) defined in
  # render.yaml, so the workflow's job is to kick off the deploy and then
  # verify the service is healthy.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ secrets.RENDER_SERVICE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets are present
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          missing=0
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing required secret RENDER_DEPLOY_HOOK_URL"
            missing=1
          fi
          if [ -z "$RENDER_SERVICE_URL" ]; then
            echo "::error::Missing required secret RENDER_SERVICE_URL"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Trigger Render deploy hook
        id: trigger
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy..."
          # Render deploy hooks accept POST with no body. -f makes curl exit
          # non-zero on HTTP >= 400 so a failed trigger fails the job.
          response=$(curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render response: $response"
          # Render returns JSON like {"deploy":{"id":"dep-..."}} — extract id
          # without requiring jq.
          deploy_id=$(printf '%s' "$response" | grep -oE '"id"[[:space:]]*:[[:space:]]*"[^"]+"' | head -1 | sed -E 's/.*"id"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          echo "deploy_id=${deploy_id}" >> "$GITHUB_OUTPUT"
          if [ -n "$deploy_id" ]; then
            echo "Deploy triggered: $deploy_id"
          else
            echo "::warning::Could not parse deploy id from response (deploy still triggered)."
          fi

      # Render runs migrations as part of its build command (see render.yaml).
      # No separate `manage.py migrate` step is needed from CI — running it
      # from GitHub would require exposing DATABASE_URL to the workflow, which
      # we deliberately avoid. If you ever switch off render.yaml's build
      # command, see docs/CICD_SETUP.md for how to run migrations from CI.

      - name: Wait for deploy + health check
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
          HEALTH_PATH: ${{ vars.HEALTH_CHECK_PATH || '/admin/login/' }}
        run: |
          set -u
          # Strip trailing slash from service URL, ensure leading slash on path.
          base="${RENDER_SERVICE_URL%/}"
          path="$HEALTH_PATH"
          case "$path" in /*) ;; *) path="/$path" ;; esac
          url="${base}${path}"
          echo "Polling health endpoint: $url"

          # Total budget: ~10 minutes (40 attempts * 15s). Render builds for
          # this app (pip install + collectstatic + migrate + gunicorn boot)
          # typically finish in 3–6 minutes.
          attempts=40
          sleep_seconds=15
          status=0
          for i in $(seq 1 "$attempts"); do
            http_code=$(curl -s -o /tmp/health.out -w "%{http_code}" --max-time 15 "$url" || echo "000")
            echo "Attempt $i/$attempts → HTTP $http_code"
            case "$http_code" in
              200|301|302)
                echo "Service is healthy (HTTP $http_code)."
                status=1
                break
                ;;
            esac
            sleep "$sleep_seconds"
          done

          if [ "$status" -ne 1 ]; then
            echo "::error::Health check failed after $attempts attempts for $url"
            echo "---- Last response body (truncated) ----"
            head -c 2000 /tmp/health.out || true
            exit 1
          fi
