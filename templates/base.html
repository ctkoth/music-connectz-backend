<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music ConnectZ Auth</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(180deg, #f7f9fc 0%, #eef4fb 100%);
            color: #172033;
        }
        .page-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .page-header {
            padding: 20px 24px 10px;
            text-align: center;
        }
        .page-header a {
            color: #1565c0;
            text-decoration: none;
            font-weight: 700;
            font-size: 28px;
        }
        .page-header p {
            margin: 8px 0 0;
            color: #5a6b85;
            font-size: 14px;
        }
        .page-content {
            flex: 1;
            padding: 12px 16px 32px;
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="page-header">
            <a href="https://musicconnectz.net/">Music ConnectZ</a>
            <p>Secure authentication portal</p>
        </div>
        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
